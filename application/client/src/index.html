    <script>
      // APIプリフェッチ: JSロード前にデータ取得を開始
      (function(){var p=location.pathname;var c={};if(p==="/"||p===""){c["/api/v1/posts?limit=30&offset=0"]=fetch("/api/v1/posts?limit=30&offset=0").then(function(r){return r.json()})}else if(p.startsWith("/posts/")){var id=p.split("/")[2];if(id){c["/api/v1/posts/"+id]=fetch("/api/v1/posts/"+id).then(function(r){return r.json()});c["/api/v1/posts/"+id+"/comments?limit=30&offset=0"]=fetch("/api/v1/posts/"+id+"/comments?limit=30&offset=0").then(function(r){return r.json()})}}window.__PREFETCH__=c})();
    </script>

  </body>
